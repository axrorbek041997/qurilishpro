name: My-Test development

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: |
            api/yarn.lock
            ui/yarn.lock

      - name: Install api dependencies
        run: yarn ci
        working-directory: api

      - name: Install ui dependencies
        run: yarn ci
        working-directory: ui

      - name: Build api
        run: yarn run build
        working-directory: api

      - name: Build ui
        run: npm yarn build
        working-directory: ui

      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ vars.PROJECT_DIR }}
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh
            sh ./run.sh
